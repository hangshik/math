<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>정수의 덧셈과 뺄셈</title>
<link rel="stylesheet" href="style.css">
<style>
    /* 정수의 덧셈과 뺄셈 고유 인터페이스 최적화 */
    
    /* 문제와 입력창을 가로 한 줄 및 화면 정중앙 배치 */
    .formula-row-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        width: 100%;
        margin: 10px 0;
    }

    #problem { 
        font-size: 48px; 
        font-weight: 800; 
        text-align: center;
        margin: 0;
        min-height: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: auto;
        flex: 1;
        background: transparent;
        border: none;
        padding: 0;
        word-break: break-all;
    }

    /* 중간 등호(=) 스타일 */
    .formula-equal {
        font-size: 44px;
        font-weight: 800;
        color: var(--text-main);
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 입력창 영역의 중앙 정렬 배치 설정 */
    .input-wrapper-inline {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 상시 파란 테두리 및 그림자 효과 유지 */
    #txt { 
        width: 100%;
        max-width: 220px;
        height: 64px;
        font-size: 36px; 
        font-weight: 700; 
        text-align: center; 
        border: 2px solid var(--active); 
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25); 
        border-radius: 12px; 
        background-color: #ffffff;
        outline: none;
        cursor: pointer;
    }
    
    /* 가상 키패드 및 제어 영역 전체 폭 확장 */
    .full-width-container {
        width: 100%;
    }

    .key-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        width: 100%;
    }

    .action-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        width: 100%;
        margin-top: 12px;
    }

    /* [디자인 수정] 정답 확인 버튼을 세련된 파란색 테마로 고도화 */
    .confirm-btn-style {
        grid-column: span 2;
        background-color: var(--active) !important; /* 메인 파란색 테마 적용 */
        color: #ffffff !important;
        border: none !important;
        border-radius: 8px !important;
        font-size: 18px !important;
        font-weight: 700 !important;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 3px 6px rgba(0, 123, 255, 0.2) !important; /* 부드러운 푸른 그림자 */
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .confirm-btn-style:hover {
        filter: brightness(0.9); /* 마우스 호버 시 자연스럽게 깊어지는 효과 */
        box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3) !important;
    }

    .confirm-btn-style:active {
        transform: scale(0.98); /* 클릭할 때 살짝 눌리는 생동감 부여 */
    }

    /* 반응형 대응: 모바일 환경 레이아웃 */
    @media (max-width: 480px) {
        #problem {
            font-size: 32px;
        }
        .formula-equal {
            font-size: 28px;
        }
        #txt {
            height: 54px;
            font-size: 26px;
        }
        .key-grid, .action-row {
            gap: 8px;
        }
        .button {
            height: 50px;
            font-size: 16px;
        }
        .confirm-btn-style {
            height: 50px !important;
            font-size: 16px !important;
        }
    }
</style>
</head>
<body>

<div id="overlay" class="modal-overlay">
    <div class="modal-box" style="border-top: 6px solid var(--danger);">
        <h2 class="modal-title">누적 기록 초기화</h2>
        <p class="modal-text">누적 기록을 모두 삭제하시겠습니까?</p>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeResetModal()">취소</button>
            <button class="modal-btn confirm" onclick="confirmReset()">초기화</button>
        </div>
    </div>
</div>

<div class="wrapper">
    <h1 class="main-title">정수의 덧셈과 뺄셈</h1>
    
    <div class="container-fixed" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        
        <div class="formula-row-container">
            <div id="problem">로딩 중...</div>
            <div class="formula-equal">=</div>
            <div class="input-wrapper-inline">
                <input type="text" id="txt" readonly placeholder="?" onclick="handleInputClick()">
            </div>
        </div>
        
        <div class="key-grid full-width-container">
            <button class="button" onclick="appendNumber(1)">1</button>
            <button class="button" onclick="appendNumber(2)">2</button>
            <button class="button" onclick="appendNumber(3)">3</button>
            <button class="button" onclick="appendNumber(4)">4</button>
            <button class="button" onclick="appendNumber(5)">5</button>
            <button class="button" onclick="appendNumber(6)">6</button>
            <button class="button" onclick="appendNumber(7)">7</button>
            <button class="button" onclick="appendNumber(8)">8</button>
            <button class="button" onclick="appendNumber(9)">9</button>
            <button class="button" onclick="appendNumber(0)">0</button>
        </div>
        
        <div class="action-row full-width-container">
            <button class="button" style="font-weight: 800;" onclick="appendNumber('-')">-</button>
            <button class="button" onclick="backspace()">←</button>
            <button class="button" onclick="clearInput()">C</button>
            <button class="confirm-btn-style" onclick="main()">정답 확인</button>
        </div>
        
        <div id="result1" class="msg-default">수식을 계산한 후 정답 확인을 눌러주세요.</div>
    </div>

    <div class="guide-box record">
        <div class="guide-header">
            <h2 class="guide-title">📊 누적 기록</h2>
            <button class="reset-btn" onclick="openResetModal()">누적기록 초기화</button>
        </div>
        <table class="record-table">
            <thead>
                <tr>
                    <th>구분</th>
                    <th>성공 횟수</th>
                    <th>실패 횟수</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>기록</td>
                    <td id="winCount" class="count-highlight">0</td>
                    <td id="loseCount" class="count-highlight">0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="guide-box shortcuts">
        <div class="guide-header">
            <h2 class="guide-title">⌨ 키보드 단축키</h2>
        </div>
        <div class="shortcut-grid">
            <div class="shortcut-item"><kbd>0</kbd> ~ <kbd>9</kbd> <span>숫자 입력</span></div>
            <div class="shortcut-item"><kbd>-</kbd> <span>마이너스 부호 입력</span></div>
            <div class="shortcut-item"><kbd>Backspace</kbd> <span>한 글자 지우기</span></div>
            <div class="shortcut-item"><kbd>Esc</kbd> <span>전체 삭제 / 모달 취소</span></div>
            <div class="shortcut-item"><kbd>Enter</kbd> / <kbd>Space</kbd> <span>정답 확인 / 모달 확인</span></div>
        </div>
    </div>
</div>

<script>
    let gameState = JSON.parse(localStorage.getItem('intMathGame')) || {
        win: 0,
        lose: 0,
        currentProblemText: "",
        currentAnswer: null
    };

    let isWrongState = false; 

    function saveState() {
        localStorage.setItem('intMathGame', JSON.stringify(gameState));
    }

    function initGame() {
        updateRecordUI();
        
        if (gameState.currentProblemText && gameState.currentAnswer !== null) {
            document.getElementById("problem").textContent = gameState.currentProblemText;
        } else {
            startNewProblem();
        }
    }

    function updateRecordUI() {
        document.getElementById("winCount").textContent = gameState.win;
        document.getElementById("loseCount").textContent = gameState.lose;
    }

    function startNewProblem() {
        let x1 = Math.floor((Math.random() * 18 - 8));
        let x2 = Math.floor((Math.random() * 18 - 8));
        let x3 = Math.floor((Math.random() * 2));
        if(x1 < 1) x1 -= 1; if(x2 < 1) x2 -= 1;
        
        gameState.currentAnswer = (x3 == 0) ? (x1 + x2) : (x1 - x2);
        gameState.currentProblemText = (x1 < 0 ? `(${x1})` : x1) + (x3 == 0 ? " + " : " - ") + (x2 < 0 ? `(${x2})` : x2);
        
        document.getElementById("problem").textContent = gameState.currentProblemText;
        saveState();
    }

    function appendNumber(num) { 
        if (isWrongState) {
            document.getElementById("txt").value = "";
        }
        resetFeedback();
        document.getElementById("txt").value += num; 
    }
    
    function resetFeedback() { 
        document.querySelectorAll('td').forEach(el => el.className = 'count-highlight');
        let res = document.getElementById("result1");
        if (res) {
            res.textContent = "수식을 계산한 후 정답 확인을 눌러주세요.";
            res.className = "msg-default";
        }
        isWrongState = false;
    }
    
    function backspace() { 
        if (isWrongState) {
            clearInput();
            return;
        }
        document.getElementById("txt").value = document.getElementById("txt").value.slice(0, -1); 
    }
    
    function clearInput() { 
        resetFeedback();
        document.getElementById("txt").value = ""; 
    }

    function handleInputClick() {
        if (isWrongState) {
            clearInput();
        }
    }

    function main() {
        const input = document.getElementById("txt"), res = document.getElementById("result1");
        if(input.value === "" || input.value === "-") return;
        
        document.querySelectorAll('td').forEach(el => el.className = 'count-highlight');

        if(parseInt(input.value) === gameState.currentAnswer) {
            gameState.win++;
            document.getElementById("winCount").textContent = gameState.win;
            document.getElementById("winCount").className = 'count-highlight win-active';
            
            res.textContent = "🎉 정답입니다!"; 
            res.className = "feedback-success"; 
            isWrongState = false;
            
            gameState.currentProblemText = "";
            gameState.currentAnswer = null;
            saveState();
            
            input.value = ""; 
            setTimeout(() => { resetFeedback(); startNewProblem(); }, 1200);
        } else {
            gameState.lose++;
            document.getElementById("loseCount").textContent = gameState.lose;
            document.getElementById("loseCount").className = 'count-highlight lose-active';
            
            res.textContent = "❌ 틀렸습니다! (입력칸을 누르면 지워집니다)"; 
            res.className = "feedback-danger"; 
            isWrongState = true;
            saveState();
        }
    }

    function openResetModal() {
        document.getElementById('overlay').classList.add('overlay-visible');
    }

    function closeResetModal() {
        document.getElementById('overlay').classList.remove('overlay-visible');
    }

    function confirmReset() {
        gameState = {
            win: 0,
            lose: 0,
            currentProblemText: "",
            currentAnswer: null
        };
        saveState();
        updateRecordUI();
        closeResetModal();
        clearInput();
        startNewProblem();
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('overlay');
        if(modal && modal.classList.contains('overlay-visible')) {
            if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); confirmReset(); }
            if(e.key === 'Escape') { e.preventDefault(); closeResetModal(); }
        } else {
            if(e.key >= '0' && e.key <= '9') appendNumber(e.key);
            else if(e.key === '-') appendNumber('-');
            else if(e.key === 'Backspace') backspace();
            else if(e.key === 'Escape') clearInput();
            else if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); main(); }
        }
    });

    window.onload = initGame;
</script>
</body>
</html>
