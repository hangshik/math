<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>다각형 내각의 합</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']] } };</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-sub: #555555;
            --primary: #007bff;
        }

        * { touch-action: manipulation; box-sizing: border-box; }

        body { 
            font-family: 'Pretendard Variable', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 36px; font-weight: 800; text-align: center; margin: 20px 0; }

        .controls, .formula-box { 
            width: 100%;
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
        }

        canvas { 
            background: var(--card-bg); 
            border-radius: 16px;
            width: 100%;
            max-width: 800px; 
            height: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .highlight-box { 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px dashed #bbb; 
            color: var(--text-sub);
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="container">
    <h1>다각형의 내각의 합</h1>
    <p style="color: var(--text-sub); margin-bottom: 20px;">슬라이더를 움직여 다각형을 변화시켜 보세요.</p>

    <div class="controls">
        <label for="nSlider" style="font-weight: bold;">변의 개수 (n): <span id="nVal" style="color:blue">3</span></label><br><br>
        <input type="range" id="nSlider" min="3" max="20" value="3" style="width: 80%;" oninput="draw()">
    </div>

    <div class="formula-box">
        <div>내부 삼각형의 개수: <span id="triCount" style="color:red; font-weight:bold;">1</span>개</div>
        <div>
            내각의 합 = $180^\circ \times$ <span id="formulaN" style="color:blue">3</span> $- 2)$ 
            = <span id="resultAngle" style="font-weight:bold; color:green;">180</span>$^\circ$
        </div>
        <div class="highlight-box">
            <div>(정다각형일 때) <strong>한 내각의 크기</strong></div>
            <div id="oneAngleFormula"></div>
        </div>
    </div>

    <canvas id="canvas" width="800" height="550"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const r = 210; 

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function draw() {
    const n = parseInt(document.getElementById('nSlider').value);
    const sumAngle = 180 * (n - 2);
    
    let resultStr = "";
    const commonDivisor = gcd(sumAngle, n);
    const numerator = sumAngle / commonDivisor;
    const denominator = n / commonDivisor;

    if (denominator === 1) {
        resultStr = `${numerator}^\\circ`;
    } else {
        resultStr = `\\dfrac{${numerator}}{${denominator}}^\\circ`;
    }

    document.getElementById('nVal').textContent = n;
    document.getElementById('triCount').textContent = n - 2;
    document.getElementById('formulaN').textContent = `(${n}`;
    document.getElementById('resultAngle').textContent = sumAngle;
    
    const formulaHtml = `$\\dfrac{180^\\circ \\times ({\\color{blue}${n}}-2)}{{\\color{blue}${n}}} = {\\color{green}\\mathbf{${resultStr}}}$`;
    document.getElementById('oneAngleFormula').innerHTML = formulaHtml;

    ctx.clearRect(0, 0, 800, 550);
    const cx = 400;
    const cy = 300; // 높이 500의 절반으로 수정하여 세로 정렬
    const vertices = [];
    for (let i = 0; i < n; i++) {
        const theta = (Math.PI * 2 * i) / n - Math.PI / 2;
        vertices.push({ x: cx + r * Math.cos(theta), y: cy + r * Math.sin(theta) });
    }
    
    ctx.beginPath();
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#222";
    ctx.moveTo(vertices[0].x, vertices[0].y);
    for (let i = 1; i < n; i++) ctx.lineTo(vertices[i].x, vertices[i].y);
    ctx.closePath();
    ctx.stroke();
    
    ctx.beginPath();
    ctx.lineWidth = n > 10 ? 2 : 3; 
    ctx.strokeStyle = "red";
    ctx.setLineDash([8, 8]);
    for (let i = 2; i < n - 1; i++) {
        ctx.moveTo(vertices[0].x, vertices[0].y);
        ctx.lineTo(vertices[i].x, vertices[i].y);
    }
    ctx.stroke();
    ctx.setLineDash([]); 

    ctx.beginPath();
    ctx.arc(vertices[0].x, vertices[0].y, 6, 0, Math.PI * 2);
    ctx.fillStyle = "red";
    ctx.fill();
    
    ctx.font = "20px 'Pretendard Variable'";
    ctx.fillStyle = "black";
    ctx.fillText("기준", vertices[0].x - 20, vertices[0].y - 20);
    
    MathJax.typesetPromise();
}

window.onload = draw;
</script>
</body>
</html>
