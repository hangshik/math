<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>소인수분해</title>
<link rel="stylesheet" href="style.css">
<style>
    /* 소인수분해 퍼즐 고유 인터페이스 최적화 */
    
    /* 문제와 입력창을 가로 한 줄 및 화면 정중앙 배치 */
    .formula-row-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        width: 100%;
        margin: 10px 0;
    }

    /* 한 줄 마진 제거 및 중앙 정렬 구조 변경 */
    #problem { 
        font-size: 56px; 
        font-weight: 800; 
        text-align: center;
        margin: 0;
        min-height: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: auto;
        flex: 1;
        background: transparent;
        border: none;
        padding: 0;
        word-break: break-all;
    }

    /* 중간 등호(=) 스타일 */
    .formula-equal {
        font-size: 48px;
        font-weight: 800;
        color: var(--text-main);
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 입력창 영역의 중앙 정렬 배치 설정 */
    .input-wrapper-inline {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 상시 파란 테두리 및 그림자 효과 유지 하도록 수정 */
    #inputDisplay { 
        width: 100%;
        max-width: 280px;
        height: 64px;
        font-size: 32px; 
        font-weight: 700; 
        text-align: center; 
        border: 2px solid var(--active); /* 상시 파란색 테두리 */
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25); /* 상시 부드러운 푸른 그림자 */
        border-radius: 12px; 
        background-color: #ffffff;
        outline: none;
        cursor: pointer; /* 클릭 가능하다는 느낌을 주도록 포인터 추가 */
    }
    
    /* 가상 키패드 및 제어 영역이 전체 폭을 채우도록 너비 확장 */
    .full-width-container {
        width: 100%;
    }

    /* 3단계 구조를 위한 무대 선택 그리드 */
    .stage-grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        width: 100%;
    }

    /* [요청 반영] 2번 항목: "새 문제", "정답 확인" 버튼이 가로 전체폭을 채우도록 그리드 컨테이너화 */
    .control-grid-layout {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 1:1 비율 균등 분할 배치 */
        gap: 12px;
        width: 100%;
    }

    /* 새 문제 버튼 고유 디자인 고도화 */
    .btn-new-prob {
        border: 1px solid #b0b5b9 !important;
        background-color: #ffffff !important;
        color: #495057 !important;
        font-weight: 700 !important;
        height: 54px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-new-prob:hover {
        background-color: #f8f9fa !important;
        border-color: #6c757d !important;
    }

    /* [요청 반영] 3번 항목: "정답 확인" 버튼을 완벽한 전역 테마 파란색으로 빌드 */
    .btn-confirm-blue {
        background-color: var(--active) !important;
        color: #ffffff !important;
        border: none !important;
        font-weight: 700 !important;
        height: 54px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 3px 6px rgba(0, 123, 255, 0.2) !important;
    }
    .btn-confirm-blue:hover:not(:disabled) {
        background-color: #0056b3 !important; /* 호버 시 안정적인 딥블루 테마로 보정 */
    }
    .btn-confirm-blue:disabled {
        background-color: #e9ecef !important;
        color: #adb5bd !important;
        border: 1px solid var(--border-color) !important;
        box-shadow: none !important;
        cursor: not-allowed;
    }

    /* [요청 반영] 1번 항목: 새 문제 횟수가 최근일 때 초록색이 아닌 파란색 전용 활성화 스타일 선언 */
    .skip-active-blue {
        background-color: rgba(0, 123, 255, 0.15) !important;
        color: var(--active) !important;
        font-weight: 800 !important;
        border: 1px solid rgba(0, 123, 255, 0.3) !important;
    }

    /* 반응형 대응: 모바일 환경 레이아웃 */
    @media (max-width: 480px) {
        #problem {
            font-size: 38px;
        }
        .formula-equal {
            font-size: 32px;
        }
        #inputDisplay {
            height: 54px;
            font-size: 24px;
        }
        .btn-new-prob, .btn-confirm-blue {
            height: 48px;
            font-size: 15px;
        }
    }
</style>
</head>
<body>

<div id="modal" class="modal-overlay">
    <div class="modal-content" style="border-top: 6px solid var(--danger);">
        <h2 id="modalTitle" class="modal-title">누적 기록 초기화</h2>
        <p id="failReason" class="modal-text">누적 기록을 모두 삭제하시겠습니까?</p>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeModal()">취소</button>
            <button class="modal-btn confirm" onclick="confirmReset()">초기화</button>
        </div>
    </div>
</div>

<div class="wrapper">
    <h1 class="main-title">소인수분해</h1>
    
    <div class="container-fixed">
        <div class="stage-grid-3">
            <button class="stage-btn" id="s1" onclick="switchStage(1)">1단계</button>
            <button class="stage-btn" id="s2" onclick="switchStage(2)">2단계</button>
            <button class="stage-btn" id="s3" onclick="switchStage(3)">3단계</button>
        </div>
    </div>

    <div class="container-fixed" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        
        <div class="formula-row-container">
            <div id="problem">로딩 중...</div>
            <div class="formula-equal">=</div>
            <div class="input-wrapper-inline">
                <input type="text" id="inputDisplay" readonly placeholder="예: 2^3*3" onclick="handleInputClick()">
            </div>
        </div>
        
        <div class="full-width-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
            <button class="keypad-btn" onclick="addChar('2')">2</button>
            <button class="keypad-btn" onclick="addChar('3')">3</button>
            <button class="keypad-btn" onclick="addChar('5')">5</button>
            <button class="keypad-btn" onclick="addChar('7')">7</button>
            <button class="keypad-btn" onclick="addChar('^')">^</button>
            <button class="keypad-btn" onclick="addChar('*')">×</button>
            <button class="keypad-btn" onclick="backspace()">←</button>
            <button class="keypad-btn" onclick="clearInput()">C</button>
        </div>
        
        <div class="control-grid-layout full-width-container" style="margin-top: 5px;">
            <button class="btn-new-prob" onclick="clickNewProblem()">새 문제</button>
            <button class="btn-confirm-blue" id="checkBtn" onclick="checkAnswer()" disabled>정답 확인</button>
        </div>
        
        <div id="result1" class="msg-default">수식을 입력한 후 정답 확인을 눌러주세요.</div>
    </div>

    <div class="guide-box record">
        <div class="guide-header">
            <h2 class="guide-title">📊 누적 기록</h2>
            <button class="reset-btn" onclick="openModal()">누적기록 초기화</button>
        </div>
        <table class="record-table">
            <thead>
                <tr>
                    <th>구분</th>
                    <th>성공 횟수</th>
                    <th>실패 횟수</th>
                    <th>새 문제 횟수</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>기록</td>
                    <td id="winCount" class="count-highlight">0</td>
                    <td id="loseCount" class="count-highlight">0</td>
                    <td id="skipCount" class="count-highlight">0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="guide-box rules">
        <div class="guide-header">
            <h2 class="guide-title">◈ 게임 방법</h2>
        </div>
        <ul class="rules-list">
            <li>소수는 밑이 작은 순서대로 입력하세요.</li>
            <li>거듭제곱은 '^' 기호를 사용하여 표현하세요.</li>
        </ul>
    </div>

    <div class="guide-box shortcuts">
        <div class="guide-header">
            <h2 class="guide-title">⌨ 키보드 단축키</h2>
        </div>
        <div class="shortcut-grid">
            <div class="shortcut-item"><kbd>0</kbd> ~ <kbd>9</kbd> <span>숫자 입력</span></div>
            <div class="shortcut-item"><kbd>*</kbd> <span>곱하기 기호(×)</span></div>
            <div class="shortcut-item"><kbd>^</kbd> <span>거듭제곱 지수</span></div>
            <div class="shortcut-item"><kbd>Backspace</kbd> <span>한 글자 지우기</span></div>
            <div class="shortcut-item"><kbd>Esc</kbd> <span>전체 삭제 / 모달 취소</span></div>
            <div class="shortcut-item"><kbd>Enter</kbd> / <kbd>Space</kbd> <span>정답 확인 / 모달 확인</span></div>
        </div>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('mathGame')) || { stage: 1, wins: 0, loses: 0, skips: 0, lastResult: null, problems: { 1: 0, 2: 0, 3: 0 }};
let isWrongState = false; // 현재 오답 피드백 상태인지 기억하는 플래그

function save() { localStorage.setItem('mathGame', JSON.stringify(data)); }

function updateBtnState() {
    let btn = document.getElementById('checkBtn');
    let hasInput = document.getElementById('inputDisplay').value.length > 0;
    if (btn) {
        btn.disabled = !hasInput;
    }
}

function updateUI() {
    document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
    const activeStageBtn = document.getElementById('s' + data.stage);
    if (activeStageBtn) activeStageBtn.classList.add('active');
    
    const winCountEl = document.getElementById('winCount');
    const loseCountEl = document.getElementById('loseCount');
    const skipCountEl = document.getElementById('skipCount');

    if (winCountEl && loseCountEl && skipCountEl) {
        // [요청 반영] 1번 항목: 새 문제(skip) 액티브 시 'win-active(녹색)' 대신 고유의 'skip-active-blue(파란색)' 주입 
        winCountEl.className = 'count-highlight' + (data.lastResult === 'win' ? ' win-active' : '');
        loseCountEl.className = 'count-highlight' + (data.lastResult === 'lose' ? ' lose-active' : '');
        skipCountEl.className = 'count-highlight' + (data.lastResult === 'skip' ? ' skip-active-blue' : '');

        winCountEl.innerHTML = data.lastResult === 'win' ? `${data.wins}` : data.wins;
        loseCountEl.innerHTML = data.lastResult === 'lose' ? `${data.loses}` : data.loses;
        skipCountEl.innerHTML = data.lastResult === 'skip' ? `${data.skips}` : data.skips;
    }
}

function switchStage(n) {
    resetFeedback();
    data.stage = n; 
    updateUI();
    if (!data.problems || data.problems[n] === 0) {
        generateProblem(false);
    } else {
        const problemEl = document.getElementById('problem');
        if (problemEl) problemEl.innerText = data.problems[n];
    }
}

function generateProblem(isSkipAction = false) {
    if (isSkipAction) {
        data.skips++;
        data.lastResult = 'skip';
    }
    
    let primes = data.stage === 3 ? [2,3,5,7,11,13] : [2,3,5,7];
    let count = data.stage === 1 ? 2 : (data.stage === 2 ? 3 : 4);
    let res = 1;
    for(let i=0; i<count; i++) res *= primes[Math.floor(Math.random() * primes.length)];
    
    if (!data.problems) data.problems = { 1: 0, 2: 0, 3: 0 };
    data.problems[data.stage] = res;
    
    const problemEl = document.getElementById('problem');
    if (problemEl) problemEl.innerText = res;
    
    clearInput(); save(); updateUI();
}

function clickNewProblem() {
    generateProblem(true);
}

function checkAnswer() {
    let input = document.getElementById('inputDisplay').value;
    let r1 = document.getElementById("result1");
    if (!r1) return;
    
    try {
        let val = eval(input.replace(/\^/g, '**').replace(/x/g, '*').replace(/X/g, '*'));
        
        let parts = input.split('*');
        let bases = [];
        for (let part of parts) {
            let base = part.split('^')[0];
            if (isNaN(base) || base === "") throw new Error();
            bases.push(parseInt(base));
        }

        let isSorted = true;
        for (let i = 0; i < bases.length - 1; i++) {
            if (bases[i] >= bases[i + 1]) { isSorted = false; break; }
        }

        if(val === data.problems[data.stage] && isSorted) {
            data.wins++;
            data.lastResult = 'win';
            isWrongState = false; // 정답이므로 오답 상태 해제
            r1.textContent = "🎉 정답입니다!"; 
            r1.className = "feedback-success";
            data.problems[data.stage] = 0;
            save(); updateUI();
            setTimeout(() => { generateProblem(false); }, 1000);
        } else throw new Error();
    } catch(e) {
        data.loses++;
        data.lastResult = 'lose';
        isWrongState = true; // 오답 상태 활성화
        r1.textContent = "❌ 오답입니다! (입력칸을 누르면 지워집니다)"; 
        r1.className = "feedback-danger";
        save(); updateUI();
    }
}

function handleInputClick() {
    if (isWrongState) {
        clearInput();
    }
}

function resetFeedback() {
    let r1 = document.getElementById("result1");
    if (r1) {
        r1.textContent = "수식을 입력한 후 정답 확인을 눌러주세요.";
        r1.className = "msg-default";
    }
    isWrongState = false; // 상태 초기화
}

function openModal() { 
    const modal = document.getElementById('modal');
    if (modal) modal.classList.add('show'); 
}

function closeModal() { 
    const modal = document.getElementById('modal');
    if (modal) modal.classList.remove('show'); 
}

function confirmReset() {
    data = { stage: 1, wins: 0, loses: 0, skips: 0, lastResult: null, problems: { 1: 0, 2: 0, 3: 0 }};
    save(); updateUI(); switchStage(1);
    closeModal();
}

function addChar(c) { 
    if (isWrongState) {
        // 오답인 상태에서 키패드를 새로 누르면 깔끔하게 지우고 새로 입력 시작
        document.getElementById('inputDisplay').value = "";
    }
    resetFeedback();
    document.getElementById('inputDisplay').value += c; 
    updateBtnState(); 
}

function backspace() { 
    if (isWrongState) {
        clearInput();
        return;
    }
    let d = document.getElementById('inputDisplay'); 
    d.value = d.value.slice(0, -1); 
    updateBtnState(); 
}

function clearInput() { 
    resetFeedback();
    document.getElementById('inputDisplay').value = ""; 
    updateBtnState(); 
}

document.addEventListener('keydown', (e) => {
    const modal = document.getElementById('modal');
    if(modal && modal.classList.contains('show')) {
        if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); confirmReset(); }
        if(e.key === 'Escape') { e.preventDefault(); closeModal(); }
    } else {
        if(e.key >= '0' && e.key <= '9') addChar(e.key);
        else if(e.key === '*') addChar('*');
        else if(e.key === '^') addChar('^');
        else if(e.key === 'Backspace') backspace();
        else if(e.key === 'Enter' || e.key === ' ') { 
            e.preventDefault(); 
            const checkBtn = document.getElementById('checkBtn');
            if(checkBtn && !checkBtn.disabled) checkAnswer(); 
        }
        else if(e.key === 'Escape') clearInput();
    }
});

window.onload = () => { updateUI(); switchStage(data.stage); };
</script>
</body>
</html>
